<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel233</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.css">
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="#00d4ff" stroke-width="2"/><path d="M8 14h12M14 8v12" stroke="#00d4ff" stroke-width="2"/></svg>
      <span>Sentinel233</span>
    </div>
    <ul class="nav-menu">
      <li class="nav-item active" data-page="overview"><a href="#overview"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="1" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="10" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg><span data-i18n="nav.dashboard">仪表盘</span></a></li>
      <li class="nav-item" data-page="explore"><a href="#explore"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M12 12l4 4" stroke="currentColor" stroke-width="1.5"/></svg><span data-i18n="nav.metrics">指标查询</span></a></li>
      <li class="nav-item" data-page="alerts"><a href="#alerts"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v2M3 9H1M17 9h-2M4.5 4.5L3 3M13.5 4.5L15 3M9 14a5 5 0 01-5-5h10a5 5 0 01-5 5z" stroke="currentColor" stroke-width="1.5"/></svg><span data-i18n="nav.alerts">告警</span></a></li>
      <li class="nav-item" data-page="targets"><a href="#targets"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="9" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="9" r="1" fill="currentColor"/></svg><span data-i18n="nav.targets">采集目标</span></a></li>
      <li class="nav-item" data-page="settings"><a href="#settings"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.3 3.3l1.4 1.4M13.3 13.3l1.4 1.4M3.3 14.7l1.4-1.4M13.3 4.7l1.4-1.4" stroke="currentColor" stroke-width="1.5"/></svg><span data-i18n="nav.settings">设置</span></a></li>
    </ul>
    <div class="nav-footer">
      <select id="lang-select" class="lang-selector">
        <option value="zh-CN">中文</option>
        <option value="en-US">English</option>
        <option value="ja-JP">日本語</option>
      </select>
    </div>
  </nav>
  <main id="content">
    <header id="topbar">
      <div class="topbar-left">
        <h1 id="page-title" data-i18n="nav.dashboard">仪表盘</h1>
      </div>
      <div class="topbar-right">
        <select id="time-range" class="time-select">
          <option value="1h" data-i18n="common.time.1h">1小时</option>
          <option value="6h" data-i18n="common.time.6h">6小时</option>
          <option value="12h" data-i18n="common.time.12h">12小时</option>
          <option value="24h" selected data-i18n="common.time.24h">24小时</option>
          <option value="7d" data-i18n="common.time.7d">7天</option>
          <option value="30d" data-i18n="common.time.30d">30天</option>
        </select>
        <button id="btn-refresh" class="btn-icon" title="Refresh"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9a6 6 0 0110.2-4M15 9a6 6 0 01-10.2 4" stroke="currentColor" stroke-width="1.5"/><path d="M13 1v4h-4M5 17v-4h4" stroke="currentColor" stroke-width="1.5"/></svg></button>
        <button id="btn-login" class="btn-text" data-i18n="nav.login">登录</button>
      </div>
    </header>
    <div id="page-content"></div>
  </main>
</div>
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal" class="modal">
    <div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="js/app.js"></script>
</body>
</html>
