<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel233 Server Console</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2334d399'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial' font-size='30' font-weight='700' fill='%2306110d'%3ES%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo">
      <span class="logo-mark">S</span>
      <div><strong>Sentinel233 Server</strong><small>Unified Observability</small></div>
    </div>
    <ul class="nav-menu">
      <li class="nav-item active" data-page="overview"><a href="#overview"><span class="nav-icon">⌁</span><span>总览</span></a></li>
      <li class="nav-item" data-page="explore"><a href="#explore"><span class="nav-icon">⌕</span><span>指标探索</span></a></li>
      <li class="nav-item" data-page="dashboards"><a href="#dashboards"><span class="nav-icon">▦</span><span>仪表盘</span></a></li>
      <li class="nav-item" data-page="alerts"><a href="#alerts"><span class="nav-icon">!</span><span>告警</span></a></li>
      <li class="nav-item" data-page="targets"><a href="#targets"><span class="nav-icon">◎</span><span>采集目标</span></a></li>
      <li class="nav-item" data-page="integrations"><a href="#integrations"><span class="nav-icon">+</span><span>接入中心</span></a></li>
      <li class="nav-item" data-page="config"><a href="#config"><span class="nav-icon">⚙</span><span>配置中心</span></a></li>
      <li class="nav-item" data-page="docs"><a href="#docs"><span class="nav-icon">?</span><span>内置文档</span></a></li>
    </ul>
    <div class="nav-footer">
      <div class="session-chip" id="session-chip">未登录</div>
      <select id="lang-select" class="lang-selector">
        <option value="zh-CN">中文</option>
        <option value="en-US">English</option>
        <option value="ja-JP">日本語</option>
      </select>
    </div>
  </nav>
  <main id="content">
    <header id="topbar">
      <div class="topbar-left">
        <h1 id="page-title">总览</h1>
        <span id="page-subtitle">Prometheus 兼容采集、存储、查询和后台配置合一</span>
      </div>
      <div class="topbar-right">
        <select id="time-range" class="time-select">
          <option value="1h" data-i18n="common.time.1h">1小时</option>
          <option value="6h" data-i18n="common.time.6h">6小时</option>
          <option value="12h" data-i18n="common.time.12h">12小时</option>
          <option value="24h" selected data-i18n="common.time.24h">24小时</option>
          <option value="7d" data-i18n="common.time.7d">7天</option>
          <option value="30d" data-i18n="common.time.30d">30天</option>
        </select>
        <button id="btn-refresh" class="btn-icon" title="刷新">↻</button>
        <button id="btn-login" class="btn btn-primary">登录</button>
      </div>
    </header>
    <div id="page-content"></div>
  </main>
</div>
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal" class="modal">
    <div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alasql@4"></script>
<script src="js/app.js"></script>
</body>
</html>
