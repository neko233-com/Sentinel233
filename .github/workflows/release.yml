name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify CI
        run: |
          go vet ./...
          go test ./... -count=1 -timeout=120s

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X github.com/neko233-com/Sentinel233/internal/version.Version=$VERSION -X github.com/neko233-com/Sentinel233/internal/version.Commit=$COMMIT -X github.com/neko233-com/Sentinel233/internal/version.Date=$DATE"

          TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"

          for target in $TARGETS; do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

            export CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH"
            go build -ldflags="$LDFLAGS" -o "sentinel233-server-${VERSION#v}-${GOOS}-${GOARCH}${EXT}" ./cmd/sentinel233-server
            go build -ldflags="$LDFLAGS" -o "sentinel233-${VERSION#v}-${GOOS}-${GOARCH}${EXT}" ./cmd/sentinel233
            go build -ldflags="$LDFLAGS" -o "sentinel233-agent-${VERSION#v}-${GOOS}-${GOARCH}${EXT}" ./cmd/sentinel233-agent
          done

      - name: Create checksums
        run: |
          sha256sum sentinel233-server-* sentinel233-agent-* sentinel233-[0-9]*-* > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sentinel233-server-*
            sentinel233-agent-*
            sentinel233-[0-9]*-*
            sha256sums.txt
